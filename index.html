<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ruru放置</title>
<link rel="stylesheet" href="css/style.css?v=0.18">
</head>
<body>
<header>
  <div class="topline">
    <div><span id="mapName">史萊姆平原</span> T<span id="tier">1</span>　<span id="stage">1</span>/10</div>
    <div>金幣 <span id="gold">0</span></div>
  </div>
  <div class="subline row">
    <div>隊伍 Lv.<span id="teamLevel">1</span>（<span id="teamExp">0</span>/<span id="teamExpNeed">0</span>）｜精華 <span id="essence">0</span>｜<span id="statusLine">自動戰鬥中</span></div>
    <button id="helpBtn" class="btn mini primary">📖 遊戲說明</button>
  </div>
</header>

<nav>
  <button class="active" data-page="battle">戰鬥</button>
  <button data-page="party">隊伍</button>
  <button data-page="bag">背包</button>
  <button data-page="maps">地圖</button>
  <button data-page="logs">紀錄</button>
  <button data-page="save">存檔</button>
</nav>

<main>
<section class="page active" id="battle">
  <div class="panel">
    <div class="row">
      <div>
        <div class="small">我方：<span id="partySummary"></span></div>
        <div class="small">敵方：<span id="enemySummary"></span></div>
      </div>
      <div class="wrap">
        <button id="speedBtn" class="btn">1x</button>
        <button id="toggleBtn" class="btn">暫停</button>
      </div>
    </div>
  </div>
  <div class="panel scene" id="battleScene">
    <div class="scene-row" id="enemyBackRow"></div>
    <div class="scene-row" id="enemyFrontRow"></div>
    <div class="scene-vs">— VS —</div>
    <div class="scene-row" id="allyFrontRow"></div>
    <div class="scene-row" id="allyBackRow"></div>
  </div>
</section>

<section class="page" id="party">
  <div class="panel">
    <div class="row"><strong>上陣陣型</strong><span class="small">可上陣 <span id="fieldCount"></span> 人</span></div>
    <div class="small" style="margin:6px 0">拖曳角色到格子擺放；上排＝前排（承受普攻）、下排＝後排。</div>
    <div id="formationGrid"></div>
    <div id="equipPanel"></div>
  </div>
  <div class="panel">
    <strong>已解鎖職業</strong>
    <div id="rosterSortBar" class="small" style="margin:7px 0"></div>
    <div id="rosterList"></div>
  </div>
</section>

<section class="page" id="bag">
  <div class="panel">
    <div class="row"><strong>裝備背包</strong><span class="small"><span id="bagCount"></span> 件｜礦物精隨 <span id="mineralCount">0</span></span></div>
    <div class="small">裝備等級＝掉落時的地圖 Tier。「洗素質」花費礦物精隨重擲素質，成本逐次翻倍。</div>
    <div id="bagTools" class="small" style="margin:7px 0"></div>
    <div id="bagList"></div>
  </div>
</section>

<section class="page" id="maps">
  <div class="panel">
    <strong>地圖</strong>
    <div id="mapList"></div>
  </div>
</section>

<section class="page" id="logs">
  <div class="panel">
    <strong>戰鬥紀錄</strong>
    <div class="log" id="battleLog" style="margin-top:8px;height:60vh"></div>
  </div>
</section>

<section class="page" id="save">
  <div class="panel">
    <strong>存檔管理</strong>
    <p class="small">自動存於瀏覽器 localStorage。也可以匯出成文字備份。</p>
    <div class="wrap">
      <button id="exportBtn" class="btn">匯出存檔</button>
      <button id="importBtn" class="btn">匯入存檔</button>
      <button id="resetBtn" class="btn danger">重置存檔</button>
    </div>
    <textarea id="saveText" style="margin-top:10px;width:100%;height:180px;background:#090b0c;color:#ddd;border:1px solid #555"></textarea>
  </div>
  <details class="panel">
    <summary>查看遊戲資料 JSON</summary>
    <pre id="dataPreview" style="white-space:pre-wrap;font-size:11px"></pre>
  </details>
</section>
</main>

<div id="updateModal" class="modal-mask" hidden>
  <div class="modal">
    <button class="modal-x" onclick="game.ui.closeUpdateModal()" aria-label="關閉">✕</button>
    <strong class="accent">📢 更新公告 <span id="updateVer"></span></strong>
    <ul id="updateNotes"></ul>
    <div class="modal-warn">！警告！：此測試遊戲可能隨時被鹿鹿清空存檔</div>
  </div>
</div>

<div id="infoModal" class="modal-mask" hidden>
  <div class="modal">
    <button class="modal-x" onclick="game.ui.closeInfo()" aria-label="關閉">✕</button>
    <strong class="accent" id="infoTitle"></strong>
    <ul id="infoBody"></ul>
  </div>
</div>

<script src="js/util.js?v=0.18"></script>
<script src="js/config.js?v=0.18"></script>
<script src="js/data.js?v=0.18"></script>
<script src="js/skills.js?v=0.18"></script>
<script src="js/art.js?v=0.18"></script>
<script src="js/sprites.js?v=0.18"></script>
<script src="js/characters.js?v=0.18"></script>
<script src="js/save.js?v=0.18"></script>
<script src="js/stats.js?v=0.18"></script>
<script src="js/equipment.js?v=0.18"></script>
<script src="js/battle.js?v=0.18"></script>
<script src="js/battle-view.js?v=0.18"></script>
<script src="js/ui.js?v=0.18"></script>
<script src="js/main.js?v=0.18"></script>
</body>
</html>
