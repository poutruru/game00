<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>game00 v0.02</title>
<style>
:root{
  --bg:#101010; --panel:#171717; --line:#3a3a3a; --text:#e8e8e8;
  --muted:#9c9c9c; --accent:#d7c08a; --good:#67df8b; --bad:#ff6b6b;
  --blue:#75b9ff; --gold:#f0cf68;
}
*{box-sizing:border-box}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
header{
  position:sticky; top:0; z-index:10; background:#0d0d0df2;
  border-bottom:1px solid var(--line); padding:12px 14px;
}
.topline{display:flex;justify-content:space-between;gap:10px;font-size:14px}
.small{font-size:12px;color:var(--muted)}
nav{
  position:sticky; top:62px; z-index:9; display:grid; grid-template-columns:repeat(4,1fr);
  background:#111; border-bottom:1px solid var(--line);
}
nav button{
  border:0; border-right:1px solid #262626; background:#111; color:var(--muted);
  padding:12px 4px; font:inherit;
}
nav button.active{color:var(--accent);background:#1b1b1b}
main{padding:12px}
.page{display:none}.page.active{display:block}
.panel{border:1px solid var(--line);background:var(--panel);padding:12px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}
.btn{
  border:1px solid #555;background:#252525;color:#eee;padding:9px 12px;font:inherit;
}
.btn:disabled{opacity:.4}.btn.primary{border-color:#8e7b4a;color:#f3d991}
.btn.danger{color:#ff9797}
.log{
  height:58vh; overflow:auto; white-space:pre-wrap; line-height:1.55;
  border:1px solid var(--line); background:#090909; padding:12px;
}
.log div{margin-bottom:4px}
.damage{color:var(--bad)} .heal{color:var(--good)} .drop{color:var(--gold)}
.skill{color:var(--blue)} .system{color:var(--accent)}
.card{border-bottom:1px solid #303030;padding:11px 0}.card:last-child{border-bottom:0}
.name{font-weight:700}
.tag{color:var(--muted);font-size:12px}
.hp{color:var(--good)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
select,input{background:#101010;color:#eee;border:1px solid #555;padding:8px;font:inherit;width:100%}
.item-title{color:var(--accent)}
.slot{color:#8fbfff}
.empty{color:#666}
.badge{display:inline-block;border:1px solid #555;padding:2px 6px;margin:2px 4px 2px 0;font-size:12px}
footer{height:20px}
</style>
</head>
<body>
<header>
  <div class="topline">
    <div>史萊姆平原 T<span id="tier">1</span>　<span id="stage">1</span>/10</div>
    <div>金幣 <span id="gold">120</span></div>
  </div>
  <div class="small" id="statusLine">自動戰鬥中</div>
</header>

<nav>
  <button data-page="battle" class="active">戰鬥</button>
  <button data-page="party">隊伍</button>
  <button data-page="bag">背包</button>
  <button data-page="summon">召募</button>
</nav>

<main>
<section id="battle" class="page active">
  <div class="panel row">
    <div>
      <div>上陣：<span id="partySummary"></span></div>
      <div class="small">第5關菁英、第10關 Boss</div>
    </div>
    <button class="btn" id="toggleBtn">暫停</button>
  </div>
  <div id="battleLog" class="log"></div>
</section>

<section id="party" class="page">
  <div class="panel">
    <div class="row"><strong>上陣隊伍</strong><span class="small">最多 3 人</span></div>
    <div id="partyList"></div>
  </div>
  <div class="panel">
    <strong>已擁有角色</strong>
    <div id="rosterList"></div>
  </div>
</section>

<section id="bag" class="page">
  <div class="panel">
    <div class="row"><strong>背包</strong><span class="small"><span id="bagCount"></span> 件</span></div>
    <div id="bagList"></div>
  </div>
</section>

<section id="summon" class="page">
  <div class="panel">
    <strong>隨機召募</strong>
    <p class="small">消耗 100 金幣。抽到重複角色會轉為英雄精華 1。</p>
    <div class="row">
      <div>英雄精華：<span id="essence">0</span></div>
      <button class="btn primary" id="summonBtn">召募 1 次</button>
    </div>
    <div id="summonResult" style="margin-top:12px"></div>
  </div>
</section>
</main>
<footer></footer>

<script>
const CHAR_POOL = [
  {id:"human_warrior_f",name:"愛莉亞",race:"人類",job:"戰士"},
  {id:"elf_priest_m",name:"諾亞",race:"精靈",job:"牧師"},
  {id:"beast_mage_f",name:"米菈",race:"獸人",job:"法師"},
  {id:"human_hunter_m",name:"凱恩",race:"人類",job:"獵人"},
  {id:"elf_rogue_f",name:"希雅",race:"精靈",job:"盜賊"},
  {id:"beast_paladin_f",name:"露可",race:"獸人",job:"聖騎士"},
  {id:"human_warlock_m",name:"賽恩",race:"人類",job:"術士"},
  {id:"elf_mage_f",name:"莉芙",race:"精靈",job:"法師"},
  {id:"beast_hunter_m",name:"雷歐",race:"獸人",job:"獵人"}
];

const SLOT_NAMES = {head:"頭",body:"身",feet:"腳",main:"主手",off:"副手"};

const defaultState = {
  gold:120, essence:0, tier:1, stage:1, running:true,
  owned:["human_warrior_f","elf_priest_m","beast_mage_f"],
  party:["human_warrior_f","elf_priest_m","beast_mage_f"],
  inventory:[
    {id:"eq1",name:"史萊姆短劍",set:"史萊姆",slot:"main",atk:12,hp:0},
    {id:"eq2",name:"史萊姆兜帽",set:"史萊姆",slot:"head",atk:0,hp:28},
    {id:"eq3",name:"狼牙長靴",set:"狼牙",slot:"feet",atk:4,hp:8}
  ],
  equipped:{}
};

let state = load();
let battleTimer = null;
let logCount = 0;

function load(){
  try{
    const s = JSON.parse(localStorage.getItem("game00-save"));
    return s ? {...structuredClone(defaultState), ...s} : structuredClone(defaultState);
  }catch(e){ return structuredClone(defaultState); }
}
function save(){ localStorage.setItem("game00-save",JSON.stringify(state)); }
function charById(id){ return CHAR_POOL.find(c=>c.id===id); }

function addLog(text,cls=""){
  const log=document.getElementById("battleLog");
  const d=document.createElement("div");
  d.textContent=text; if(cls)d.className=cls;
  log.appendChild(d); log.scrollTop=log.scrollHeight;
  while(log.children.length>180)log.removeChild(log.firstChild);
}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function randomMonster(){
  if(state.stage===10)return "史萊姆王";
  if(state.stage===5)return "巨大史萊姆";
  return rand(["史萊姆A","史萊姆B","史萊姆C"]);
}
function dropEquipment(){
  const slots=Object.keys(SLOT_NAMES);
  const slot=rand(slots);
  const n = {
    head:"史萊姆兜帽",body:"史萊姆外衣",feet:"史萊姆長靴",
    main:"史萊姆武器",off:"史萊姆副手"
  }[slot];
  const item={
    id:"eq_"+Date.now()+"_"+Math.random().toString(16).slice(2),
    name:n,set:"史萊姆",slot,
    atk: slot==="main" ? 8+state.tier*3 : Math.floor(Math.random()*4),
    hp: ["head","body","off"].includes(slot) ? 15+state.tier*5 : Math.floor(Math.random()*6)
  };
  state.inventory.push(item);
  addLog(`獲得裝備「${item.name}」｜${SLOT_NAMES[slot]}｜攻擊+${item.atk}｜生命+${item.hp}`,"drop");
}
function battleTick(){
  if(!state.running)return;
  const partyChars=state.party.map(charById).filter(Boolean);
  if(!partyChars.length){ addLog("沒有上陣角色，戰鬥停止。","system"); state.running=false; renderAll(); return; }
  const roll=Math.random();
  const actor=rand(partyChars), monster=randomMonster();
  if(roll<0.48){
    const dmg=10+Math.floor(Math.random()*35)+state.tier*2;
    addLog(`${actor.name} 普通攻擊 ${monster}，造成 ${dmg} 點傷害`,"damage");
  }else if(roll<0.74){
    const skill={戰士:"旋風斬",牧師:"治癒術",法師:"火球術",獵人:"三重射擊",盜賊:"毒刃",聖騎士:"神聖護盾",術士:"腐化"}[actor.job];
    if(actor.job==="牧師"){
      const heal=18+Math.floor(Math.random()*22);
      addLog(`${actor.name} 使用「${skill}」，恢復 ${heal} 點生命`,"heal");
    }else{
      const dmg=24+Math.floor(Math.random()*48)+state.tier*3;
      addLog(`${actor.name} 使用「${skill}」，對 ${monster} 造成 ${dmg} 點傷害`,"skill");
    }
  }else if(roll<0.91){
    const dmg=6+Math.floor(Math.random()*17)+state.tier;
    addLog(`${monster} 攻擊 ${actor.name}，造成 ${dmg} 點傷害`);
  }else{
    const earned=22+Math.floor(Math.random()*36)+state.tier*5;
    state.gold+=earned;
    addLog(`戰鬥勝利，獲得 ${earned} 金幣。`,"drop");
    if(Math.random()<0.58)dropEquipment();
    state.stage++;
    if(state.stage===5)addLog("第 5 關：菁英怪出現。","system");
    if(state.stage===10)addLog("第 10 關：Boss「史萊姆王」出現。","system");
    if(state.stage>10){
      state.stage=1; state.tier++;
      addLog(`史萊姆平原提升至 Tier ${state.tier}。`,"system");
    }else{
      addLog(`進入第 ${state.stage} 關。`,"system");
    }
    save(); renderAll();
  }
}

function equip(itemId,charId){
  const item=state.inventory.find(i=>i.id===itemId);
  if(!item)return;
  state.equipped[charId] ||= {};
  // unequip previous item of same slot
  const prevId=state.equipped[charId][item.slot];
  state.equipped[charId][item.slot]=itemId;
  save(); renderAll();
}
function toggleParty(id){
  const idx=state.party.indexOf(id);
  if(idx>=0) state.party.splice(idx,1);
  else if(state.party.length<3) state.party.push(id);
  save(); renderAll();
}
function summon(){
  if(state.gold<100){document.getElementById("summonResult").textContent="金幣不足。";return}
  state.gold-=100;
  const c=rand(CHAR_POOL);
  if(state.owned.includes(c.id)){
    state.essence++;
    document.getElementById("summonResult").textContent=`重複角色：${c.name}（${c.race}・${c.job}）→ 英雄精華 +1`;
  }else{
    state.owned.push(c.id);
    document.getElementById("summonResult").textContent=`獲得新角色：${c.name}（${c.race}・${c.job}）`;
  }
  save(); renderAll();
}

function renderAll(){
  document.getElementById("gold").textContent=state.gold;
  document.getElementById("tier").textContent=state.tier;
  document.getElementById("stage").textContent=state.stage;
  document.getElementById("essence").textContent=state.essence;
  document.getElementById("statusLine").textContent=state.running?"自動戰鬥中":"已暫停";
  document.getElementById("toggleBtn").textContent=state.running?"暫停":"繼續";
  document.getElementById("partySummary").textContent=state.party.map(id=>charById(id)?.name).filter(Boolean).join("、")||"無";

  const partyList=document.getElementById("partyList");
  partyList.innerHTML="";
  state.party.forEach((id,idx)=>{
    const c=charById(id), eq=state.equipped[id]||{};
    const equipText=Object.entries(eq).map(([slot,eid])=>{
      const item=state.inventory.find(i=>i.id===eid);
      return item ? `${SLOT_NAMES[slot]}：${item.name}` : "";
    }).filter(Boolean).join("｜")||"尚未裝備";
    partyList.innerHTML+=`<div class="card"><div class="row"><div><span class="name">${idx+1}. ${c.name}</span><div class="tag">${c.race}・${c.job}</div></div><button class="btn danger" onclick="toggleParty('${id}')">下陣</button></div><div class="small">${equipText}</div></div>`;
  });

  const roster=document.getElementById("rosterList");
  roster.innerHTML="";
  state.owned.map(charById).filter(Boolean).forEach(c=>{
    const on=state.party.includes(c.id);
    roster.innerHTML+=`<div class="card row"><div><span class="name">${c.name}</span><div class="tag">${c.race}・${c.job}</div></div><button class="btn ${on?"danger":"primary"}" onclick="toggleParty('${c.id}')" ${!on&&state.party.length>=3?"disabled":""}>${on?"下陣":"上陣"}</button></div>`;
  });

  const bag=document.getElementById("bagList");
  document.getElementById("bagCount").textContent=state.inventory.length;
  bag.innerHTML="";
  if(!state.inventory.length) bag.innerHTML='<div class="empty">背包是空的。</div>';
  state.inventory.forEach(item=>{
    const options=state.party.map(id=>{
      const c=charById(id); return `<option value="${id}">${c.name}</option>`;
    }).join("");
    bag.innerHTML+=`<div class="card">
      <div class="item-title">${item.name}</div>
      <div class="tag">套裝：${item.set}｜部位：${SLOT_NAMES[item.slot]}</div>
      <div>攻擊 +${item.atk}　生命 +${item.hp}</div>
      <div class="grid2" style="margin-top:8px">
        <select id="sel_${item.id}">${options}</select>
        <button class="btn" onclick="equip('${item.id}',document.getElementById('sel_${item.id}').value)">裝備</button>
      </div>
    </div>`;
  });
}

document.querySelectorAll("nav button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active"); document.getElementById(btn.dataset.page).classList.add("active");
  });
});
document.getElementById("toggleBtn").onclick=()=>{state.running=!state.running;save();renderAll()}
document.getElementById("summonBtn").onclick=summon;

renderAll();
addLog("戰鬥開始。","system");
setInterval(battleTick,700);
</script>
</body>
</html>
