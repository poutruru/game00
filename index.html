<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>game00 全功能文字原型</title>
<style>
:root{
  --bg:#0d0f10;--panel:#141719;--panel2:#0a0c0d;--line:#34393d;
  --text:#e8ecef;--muted:#90979d;--accent:#d8c48c;--good:#70dc91;
  --bad:#ff7272;--blue:#78baff;--gold:#f0cf67;--purple:#bf8cff;
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
button,select,input{font:inherit}
header{position:sticky;top:0;z-index:20;background:#0a0c0df2;border-bottom:1px solid var(--line);padding:10px 12px}
.topline{display:flex;justify-content:space-between;gap:8px;font-size:14px}
.subline{font-size:12px;color:var(--muted);margin-top:4px}
nav{
  position:sticky;top:58px;z-index:19;display:grid;grid-template-columns:repeat(6,1fr);
  background:#101214;border-bottom:1px solid var(--line)
}
nav button{border:0;border-right:1px solid #272b2e;background:#101214;color:var(--muted);padding:11px 2px}
nav button.active{background:#1a1e20;color:var(--accent)}
main{padding:10px}
.page{display:none}.page.active{display:block}
.panel{background:var(--panel);border:1px solid var(--line);padding:11px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.wrap{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:#23272a;color:var(--text);border:1px solid #53595d;padding:8px 10px}
.btn.primary{color:#f1d991;border-color:#8b794a}.btn.danger{color:#ff9c9c}.btn:disabled{opacity:.35}
.small{font-size:12px;color:var(--muted)}
.name{font-weight:700}.accent{color:var(--accent)}.good{color:var(--good)}.bad{color:var(--bad)}
.blue{color:var(--blue)}.gold{color:var(--gold)}.purple{color:var(--purple)}
.card{padding:10px 0;border-bottom:1px solid #2e3336}.card:last-child{border-bottom:0}
.badge{display:inline-block;border:1px solid #4e5458;padding:2px 5px;margin:2px 3px 2px 0;font-size:11px}
.log{height:32vh;overflow:auto;white-space:pre-wrap;line-height:1.48;background:var(--panel2);border:1px solid var(--line);padding:10px}
.log div{margin:0 0 3px}
.log .damage{color:var(--bad)}.log .heal{color:var(--good)}.log .skill{color:var(--blue)}
.log .drop{color:var(--gold)}.log .system{color:var(--accent)}.log .death{color:#ff9c9c}
.hpbar{height:8px;background:#282d30;border:1px solid #3c4246;margin-top:4px}
.hpfill{height:100%;background:#5bc77a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
select,input{width:100%;background:#0d0f10;color:var(--text);border:1px solid #52585c;padding:8px}
hr{border:0;border-top:1px solid var(--line)}
summary{cursor:pointer;color:var(--accent)}
.panel,.btn,select,input,.log,textarea{border-radius:10px}
.badge{border-radius:6px}
.hpbar,.hpfill{border-radius:3px}
.pix{image-rendering:pixelated;vertical-align:middle}
.cardrow{display:flex;align-items:center;gap:10px}
.cardrow>.grow{flex:1;min-width:0}
.scene{background:linear-gradient(#232b3f 0%,#1a2030 45%,#26301f 100%);padding:14px 6px 10px}
.scene-row{display:flex;justify-content:center;align-items:flex-end;gap:8px;min-height:92px;flex-wrap:wrap}
.scene-vs{text-align:center;color:#59626c;font-size:10px;margin:6px 0;letter-spacing:4px}
.unit{position:relative;text-align:center;width:62px}
.unit .ubox{display:inline-block}
.unit.dead{opacity:.22;filter:grayscale(1)}
.unit.atk .ubox{animation:lungeUp .32s}
.unit.enemy.atk .ubox{animation:lungeDown .32s}
.unit.hit .ubox{animation:shake .3s}
@keyframes lungeUp{30%{transform:translateY(-9px) scale(1.07)}}
@keyframes lungeDown{30%{transform:translateY(9px) scale(1.07)}}
@keyframes shake{20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(2px)}}
.unit .uhp{height:5px;background:#282d30;border-radius:3px;margin:3px 6px 0;overflow:hidden}
.unit .uhpfill{height:100%;background:linear-gradient(90deg,#5bc77a,#8fe3a5);transition:width .2s}
.unit.enemy .uhpfill{background:linear-gradient(90deg,#e06666,#f0938f)}
.unit .uname{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dmg{position:absolute;left:50%;top:0;transform:translateX(-50%);font-weight:700;font-size:13px;pointer-events:none;animation:rise .7s forwards;text-shadow:0 1px 2px #000;z-index:5}
.dmg.hurt{color:#ff9c9c}.dmg.crit{color:#ffd166;font-size:16px}.dmg.heal{color:#8fe3a5}
@keyframes rise{to{transform:translate(-50%,-24px);opacity:0}}
@media(max-width:600px){nav{grid-template-columns:repeat(3,1fr);top:58px}.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="topline">
    <div><span id="mapName">史萊姆平原</span> T<span id="tier">1</span>　<span id="stage">1</span>/10</div>
    <div>金幣 <span id="gold">0</span></div>
  </div>
  <div class="subline">
    世界周回 <span id="worldClear">0</span>｜英雄精華 <span id="essence">0</span>｜<span id="statusLine">自動戰鬥中</span>
  </div>
</header>

<nav>
  <button class="active" data-page="battle">戰鬥</button>
  <button data-page="party">隊伍</button>
  <button data-page="bag">背包</button>
  <button data-page="maps">地圖</button>
  <button data-page="summon">召募</button>
  <button data-page="save">存檔</button>
</nav>

<main>
<section class="page active" id="battle">
  <div class="panel">
    <div class="row">
      <div>
        <div>我方：<span id="partySummary"></span></div>
        <div class="small">敵方：<span id="enemySummary"></span></div>
      </div>
      <div class="wrap">
        <button id="speedBtn" class="btn">1x</button>
        <button id="toggleBtn" class="btn">暫停</button>
      </div>
    </div>
  </div>
  <div class="panel scene" id="battleScene">
    <div class="scene-row" id="enemyRow"></div>
    <div class="scene-vs">— VS —</div>
    <div class="scene-row" id="allyRow"></div>
  </div>
  <div class="log" id="battleLog"></div>
</section>

<section class="page" id="party">
  <div class="panel">
    <div class="row"><strong>上陣隊伍</strong><span class="small">欄位 <span id="partySlots"></span></span></div>
    <div id="partyList"></div>
    <div id="resonanceBox" class="small"></div>
    <div id="heroSlotBox" class="card small"></div>
  </div>
  <div class="panel">
    <strong>已擁有角色</strong>
    <div id="rosterList"></div>
  </div>
</section>

<section class="page" id="bag">
  <div class="panel">
    <div class="row"><strong>裝備背包</strong><span class="small"><span id="bagCount"></span> 件</span></div>
    <div class="small">裝備部位：頭、身、腳、主手、副手。套裝只取目前最高的 2／3／5 件效果。</div>
    <div id="bagList"></div>
  </div>
</section>

<section class="page" id="maps">
  <div class="panel">
    <strong>地圖</strong>
    <div id="mapList"></div>
  </div>
</section>

<section class="page" id="summon">
  <div class="panel">
    <strong>隨機召募</strong>
    <p class="small">每次 100 金幣。重複角色分解為英雄精華 1。</p>
    <div class="wrap">
      <button id="summonBtn" class="btn primary">召募 1 次（100）</button>
      <button id="summon10Btn" class="btn primary">召募 10 次（900）</button>
    </div>
    <hr>
    <div class="small">英雄精華 <span id="essenceCount">0</span>／每 20 精華可指定換取 1 名尚未擁有的隨機角色。</div>
    <button id="essenceBtn" class="btn" style="margin-top:6px">精華交換（20 精華）</button>
    <div id="summonResult" style="margin-top:10px"></div>
  </div>
</section>

<section class="page" id="save">
  <div class="panel">
    <strong>存檔管理</strong>
    <p class="small">自動存於瀏覽器 localStorage。也可以匯出成文字備份。</p>
    <div class="wrap">
      <button id="exportBtn" class="btn">匯出存檔</button>
      <button id="importBtn" class="btn">匯入存檔</button>
      <button id="resetBtn" class="btn danger">重置存檔</button>
    </div>
    <textarea id="saveText" style="margin-top:10px;width:100%;height:180px;background:#090b0c;color:#ddd;border:1px solid #555"></textarea>
  </div>
  <details class="panel">
    <summary>查看內嵌資料 JSON</summary>
    <pre id="dataPreview" style="white-space:pre-wrap;font-size:11px"></pre>
  </details>
</section>
</main>

const spriteCache={};
function spriteURL(kind,key){
  const cacheKey=kind+":"+key;
  if(spriteCache[cacheKey])return spriteCache[cacheKey];
  let grid,pal;
  if(kind==="char"){
    const [race,job]=key.split("_"),spr=PIXELS.heroes[job];
    if(!spr)return "";
    grid=spr.grid;pal={...spr.palette,...(PIXELS.racePalettes[race]||{})};
  }else{
    const spr=PIXELS.enemies[ENEMY_SPRITE[key]]||PIXELS.enemies.slime;
    grid=spr.grid;pal=spr.palette;
  }
  const cv=document.createElement("canvas");cv.width=16;cv.height=16;
  const ctx=cv.getContext("2d");
  grid.forEach((row,y)=>{for(let x=0;x<row.length;x++){const ch=row[x];if(ch===".")continue;ctx.fillStyle=pal[ch]||"#f0f";ctx.fillRect(x,y,1,1)}});
  return spriteCache[cacheKey]=cv.toDataURL();
}
function spriteImg(kind,key,size=48){return `<img class="pix" src="${spriteURL(kind,key)}" width="${size}" height="${size}" alt="">`}

<script>
const DATA=JSON.parse(document.getElementById("game-data").textContent);
const SAVE_KEY="game00-full-save";
const SAVE_VERSION=6;
const SLOTS={head:"頭",body:"身",feet:"腳",main:"主手",off:"副手"};
const SLOT_ORDER={head:0,body:1,feet:2,main:3,off:4};
const JOB=Object.fromEntries(DATA.jobs.map(x=>[x.id,x]));
const RACE=Object.fromEntries(DATA.races.map(x=>[x.id,x]));
const MAP=Object.fromEntries(DATA.maps.map(x=>[x.id,x]));
const allCharacters=[];
for(const race of DATA.races)for(const job of DATA.jobs){
  allCharacters.push({id:`${race.id}_${job.id}`,race:race.id,job:job.id});
}
const defaultState={
  version:SAVE_VERSION,gold:300,essence:0,worldClear:0,unlockedMaps:1,currentMap:"slime",stage:1,
  tiers:Object.fromEntries(DATA.maps.map(m=>[m.id,1])),running:true,speed:1,
  owned:["human_warrior","elf_priest","beastkin_mage"],party:["human_warrior","elf_priest","beastkin_mage"],
  progress:{human_warrior:{level:1,exp:0},elf_priest:{level:1,exp:0},beastkin_mage:{level:1,exp:0}},
  inventory:[],equipped:{},battle:null,heroSlot:null
};
let state=loadState(),timer=null;
function clone(x){return JSON.parse(JSON.stringify(x))}
function validCharacterId(id){return allCharacters.some(c=>c.id===id)}
function migrateCharacterId(id){
  if(validCharacterId(id))return id;
  if(typeof id!=="string")return null;
  const parts=id.split("_");
  const candidate=parts.slice(0,2).join("_");
  return validCharacterId(candidate)?candidate:null;
}
function loadState(){
  try{
    const raw=JSON.parse(localStorage.getItem(SAVE_KEY)||"{}");
    const merged={...clone(defaultState),...raw,version:SAVE_VERSION,battle:null};
    merged.owned=[...new Set((Array.isArray(raw.owned)?raw.owned:defaultState.owned).map(migrateCharacterId).filter(Boolean))];
    if(!merged.owned.length)merged.owned=clone(defaultState.owned);
    merged.party=[...new Set((Array.isArray(raw.party)?raw.party:defaultState.party).map(migrateCharacterId).filter(id=>id&&merged.owned.includes(id)))];
    if(!merged.party.length)merged.party=merged.owned.slice(0,3);
    merged.inventory=Array.isArray(raw.inventory)?raw.inventory:[];
    merged.tiers={...clone(defaultState.tiers),...(raw.tiers||{})};
    merged.equipped={};
    if(raw.equipped&&typeof raw.equipped==="object"){
      for(const [oldId,eq] of Object.entries(raw.equipped)){
        const id=migrateCharacterId(oldId);if(!id||!eq||typeof eq!=="object")continue;
        merged.equipped[id]={...(merged.equipped[id]||{}),...eq};
      }
    }
    merged.progress={};
    if(raw.progress&&typeof raw.progress==="object"){
      for(const [oldId,p] of Object.entries(raw.progress)){
        const id=migrateCharacterId(oldId);if(!id)continue;
        const old=merged.progress[id]||{level:1,exp:0};
        merged.progress[id]={level:Math.max(old.level,Number(p.level)||1),exp:Math.max(old.exp,Number(p.exp)||0)};
      }
    }
    for(const id of merged.owned)merged.progress[id]||={level:1,exp:0};
    merged.stage=Math.min(10,Math.max(1,Number(raw.stage)||1));
    merged.worldClear=Math.max(0,Number(raw.worldClear)||0);
    merged.unlockedMaps=Math.min(DATA.maps.length,Math.max(1,Number(raw.unlockedMaps)||1));
    merged.currentMap=MAP[raw.currentMap]?raw.currentMap:"slime";
    merged.speed=[1,2,5].includes(raw.speed)?raw.speed:1;
    merged.running=raw.running!==false;
    merged.gold=Math.max(0,Number(raw.gold)||0);merged.essence=Math.max(0,Number(raw.essence)||0);
    return merged;
  }catch(err){console.warn("存檔遷移失敗，使用預設存檔。",err);return clone(defaultState)}
}
function saveState(){state.version=SAVE_VERSION;const copy={...state,battle:null};localStorage.setItem(SAVE_KEY,JSON.stringify(copy))}
function getChar(id){return allCharacters.find(c=>c.id===id)}
function label(c){return c?`${RACE[c.race].name}-${JOB[c.job].name}`:"未知角色"}
function progressOf(id){state.progress[id]||={level:1,exp:0};return state.progress[id]}
function expNeeded(level){return 45+level*30}
function addLog(text,cls=""){const el=document.getElementById("battleLog"),d=document.createElement("div");d.textContent=text;d.className=cls;el.appendChild(d);while(el.children.length>220)el.removeChild(el.firstChild);el.scrollTop=el.scrollHeight}
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function partySlots(){return state.worldClear>=2?5:state.worldClear>=1?4:3}
function heroSlotUnlocked(){return state.worldClear>=3}
function findWearer(itemId){for(const [cid,eq] of Object.entries(state.equipped))for(const eid of Object.values(eq||{}))if(eid===itemId)return cid;return null}
function equippedItems(cid,overrideItem=null){
  const eq=state.equipped[cid]||{},items=[];
  for(const [slot,id] of Object.entries(eq)){
    if(overrideItem&&slot===overrideItem.slot)continue;
    const item=state.inventory.find(i=>i.id===id);if(item)items.push(item);
  }
  if(overrideItem)items.push(overrideItem);
  return items;
}
function setCountsFromItems(items){const counts={};for(const i of items)counts[i.set]=(counts[i.set]||0)+1;return counts}
function setTier(n){return n>=5?5:n>=3?3:n>=2?2:0}
function baseStats(c,overrideItem=null){
  const j=JOB[c.job],p=progressOf(c.id),growth=1+(p.level-1)*.06;
  let hp=j.hp*growth,atk=j.atk*growth,def=j.def*growth,speed=j.speed,crit=c.job==="rogue"?.18:.08;
  const items=equippedItems(c.id,overrideItem);
  for(const i of items){hp+=Number(i.hp)||0;atk+=Number(i.atk)||0;def+=Number(i.def)||0;speed+=Number(i.speed)||0;crit+=Number(i.crit)||0}
  for(const [set,n] of Object.entries(setCountsFromItems(items))){
    const tier=setTier(n);
    if(set==="史萊姆"&&tier>=2)hp*=1.15;
    if(set==="哥布林"&&tier>=2)speed*=1.10;
    if(set==="狼牙"&&tier>=2)crit+=.10;
    if(set==="魔王"&&tier>=2){hp*=1.08;atk*=1.08;def*=1.08}
  }
  return {maxHp:Math.round(hp),atk:Math.round(atk),def:Math.round(def),speed:+speed.toFixed(2),crit:+crit.toFixed(3)};
}
function resonance(){
  const counts={};for(const id of state.party){const c=getChar(id);if(c)counts[c.race]=(counts[c.race]||0)+1}
  const out=[];for(const [race,n] of Object.entries(counts)){const tier=n>=5?5:n>=3?3:n>=2?2:0;if(tier)out.push({race,tier,text:RACE[race].resonance[tier]})}return out;
}
function applyResonance(stats){
  const s={...stats};for(const r of resonance()){
    if(r.race==="human"){const p=r.tier===2?.05:r.tier===3?.10:.20;s.maxHp*=1+p;s.atk*=1+p}
    if(r.race==="demon")s.atk*=r.tier===2?1.08:r.tier===3?1.13:1.20;
    if(r.race==="elf")s.speed*=1+(r.tier===2?.08:r.tier===3?.15:.25);
    if(r.race==="angel")s.maxHp*=r.tier===2?1.05:r.tier===3?1.10:1.15;
    if(r.race==="beastkin")s.crit+=r.tier===2?.06:.10;
    if(r.race==="undead")s.def*=r.tier===2?1.05:r.tier===3?1.10:1.16;
  }
  return {maxHp:Math.round(s.maxHp),atk:Math.round(s.atk),def:Math.round(s.def),speed:+s.speed.toFixed(2),crit:+s.crit.toFixed(3)};
}
function effectiveStats(c,overrideItem=null){return applyResonance(baseStats(c,overrideItem))}
function createEnemy(name,type,index,map,tier){
  const mapIndex=DATA.maps.indexOf(map),base=75+mapIndex*48,stageScale=1+(state.stage-1)*.105,tierScale=1+(tier-1)*.30;
  const hpMul={normal:1,elite:3.4,boss:8}[type],atkMul={normal:1,elite:1.35,boss:1.75}[type],defMul={normal:1,elite:1.4,boss:1.8}[type],scale=stageScale*tierScale;
  const enemy={id:`${type}_${index}`,name,type,maxHp:Math.round(base*scale*hpMul),hp:0,atk:Math.round((13+mapIndex*5.5)*scale*atkMul),def:Math.round((3+mapIndex*4.2)*scale*defMul),turn:0,alive:true};enemy.hp=enemy.maxHp;return enemy;
}
function newBattle(){
  const map=MAP[state.currentMap],tier=state.tiers[state.currentMap];
  const enemies=[createEnemy(`${map.normal} A`,"normal",1,map,tier),createEnemy(`${map.normal} B`,"normal",2,map,tier),createEnemy(`${map.normal} C`,"normal",3,map,tier)];
  if(state.stage===5)enemies.push(createEnemy(map.elite,"elite",4,map,tier));
  if(state.stage===10){enemies.push(createEnemy(map.elite,"elite",4,map,tier));enemies.push(createEnemy(map.boss,"boss",5,map,tier))}
  const allies=state.party.map(getChar).filter(Boolean).map(c=>{const s=effectiveStats(c);return {id:c.id,job:c.job,...s,hp:s.maxHp,charge:0,cd:0,turn:0,alive:true}});
  state.battle={enemies,allies,time:0,token:Math.random().toString(36).slice(2)};addLog(`${state.stage===10?"Boss":state.stage===5?"菁英":"普通"}戰開始：${enemies.map(e=>e.name).join("、")}。`,"system");
}
function livingEnemies(b){return b.enemies.filter(e=>e.alive&&e.hp>0)}
function damage(target,raw){const value=Math.max(1,Math.round(raw-target.def*.45));target.hp=Math.max(0,target.hp-value);return value}
function enemyExp(enemy){const mapIndex=DATA.maps.findIndex(m=>m.id===state.currentMap),tier=state.tiers[state.currentMap],mul=enemy.type==="boss"?8:enemy.type==="elite"?3:1;return Math.round((8+mapIndex*4+tier*3)*mul)}
function grantExp(amount){
  for(const id of state.party){const p=progressOf(id);p.exp+=amount;while(p.exp>=expNeeded(p.level)){p.exp-=expNeeded(p.level);p.level++;addLog(`${label(getChar(id))} 升至 Lv.${p.level}。`,"system")}}
  addLog(`上陣角色各獲得 ${amount} 經驗。`,"drop");saveState();
}
function markEnemyDeath(enemy){if(enemy.hp<=0&&enemy.alive){enemy.alive=false;addLog(`${enemy.name} 死亡。`,"death");grantExp(enemyExp(enemy))}}
function chooseEnemy(b){return rand(livingEnemies(b))}
function rollEquipment(map,tier){
  const chance=state.stage===10?1:state.stage===5?.35:.10;
  if(Math.random()>=chance)return;
  const slot=rand(Object.keys(SLOTS)),set=map.set,q=1+Math.floor(Math.random()*3)+Math.floor(tier/3);
  const item={id:`eq_${Date.now()}_${Math.random().toString(36).slice(2)}`,name:`${set}${SLOTS[slot]}`,set,slot,
    hp:["head","body","off"].includes(slot)?Math.round((8+q*6)*(1+tier*.14)):Math.floor(q*2),
    atk:slot==="main"?Math.round((5+q*5)*(1+tier*.13)):Math.floor(q*1.5),
    def:["body","head"].includes(slot)?2+q*2:0,speed:slot==="feet"?q*.02:0,crit:slot==="main"?q*.006:0};
  const same=state.inventory.filter(x=>x.name===item.name).length,limit=state.owned.length+2;
  if(same>=limit){const money=Math.max(5,Math.round(item.atk*2+item.hp*.35+item.def*3+item.speed*100+item.crit*500));state.gold+=money;addLog(`「${item.name}」已達 ${limit} 件，自動換成 ${money} 金幣。`,"drop")}
  else{state.inventory.push(item);addLog(`掉落「${item.name}」｜攻擊+${item.atk} 生命+${item.hp} 防禦+${item.def}。`,"drop")}
}
function winBattle(){
  const map=MAP[state.currentMap],tier=state.tiers[state.currentMap],mapIndex=DATA.maps.findIndex(m=>m.id===state.currentMap);
  const money=22+mapIndex*12+tier*8+state.stage*3;state.gold+=money;addLog(`關卡勝利，獲得 ${money} 金幣。`,"drop");rollEquipment(map,tier);
  if(state.stage<10){state.stage++}
  else{
    state.tiers[state.currentMap]++;
    if(mapIndex<DATA.maps.length-1){
      state.unlockedMaps=Math.max(state.unlockedMaps,mapIndex+2);state.currentMap=DATA.maps[mapIndex+1].id;state.stage=1;
      addLog(`擊敗 ${map.boss}，自動前往 ${DATA.maps[mapIndex+1].name}。`,"system");
    }else{
      state.worldClear++;state.currentMap=DATA.maps[0].id;state.stage=1;
      addLog(`完成第 ${state.worldClear} 周目，返回 ${DATA.maps[0].name}。`,"system");
      if(state.worldClear===1)addLog("解鎖第 4 個隊伍名額。","system");
      if(state.worldClear===2)addLog("解鎖第 5 個隊伍名額。","system");
      if(state.worldClear===3)addLog("英雄槽已解鎖；目前尚無英雄卡池。","system");
    }
  }
  state.battle=null;saveState();renderAll();setTimeout(newBattle,450);
}
function loseBattle(){
  const old=state.stage;state.stage=Math.max(1,state.stage-1);state.battle=null;
  addLog(`隊伍全滅：關卡 ${old} → ${state.stage}，返回前一關反覆累積經驗。`,"death");saveState();renderAll();setTimeout(newBattle,750);
}
function stepBattle(){
  if(!state.running)return;if(!state.battle)newBattle();const b=state.battle;b.time+=.5;
  for(const a of b.allies){if(!a.alive)continue;a.cd-=.5;a.turn+=a.speed*.5}
  const actors=b.allies.filter(a=>a.alive&&(a.cd<=0||a.turn>=1));
  if(actors.length&&livingEnemies(b).length){
    const a=rand(actors),c=getChar(a.id),job=JOB[c.job],actor=`${label(c)} Lv.${progressOf(c.id).level}`;
    if(a.cd<=0){
      a.cd=c.job==="mage"?4.3:5.2;
      if(c.job==="priest"){
        const target=b.allies.filter(x=>x.alive).sort((x,y)=>x.hp/x.maxHp-y.hp/y.maxHp)[0],heal=Math.round(a.atk*2.4);target.hp=Math.min(target.maxHp,target.hp+heal);a.charge+=heal;fxAttack("ally",a.id);fxPop("ally",target.id,"+"+heal,"heal");addLog(`${actor} 使用「${job.cdSkill}」，${label(getChar(target.id))} 恢復 ${heal} 生命。`,"heal")
      }else if(c.job==="paladin"){const heal=Math.round(a.maxHp*.12);a.hp=Math.min(a.maxHp,a.hp+heal);fxAttack("ally",a.id);fxPop("ally",a.id,"+"+heal,"heal");addLog(`${actor} 使用「${job.cdSkill}」。`,"skill")}
      else{const target=chooseEnemy(b),crit=Math.random()<a.crit,value=damage(target,a.atk*(c.job==="mage"?2.2:1.8)*(crit?1.7:1));fxAttack("ally",a.id);fxHit("enemy",target.id,value,crit?"crit":"hurt");addLog(`${actor} 使用「${job.cdSkill}」，對 ${target.name} 造成 ${value} 傷害${crit?"（暴擊）":""}。`,"skill");a.charge++;markEnemyDeath(target)}
    }else{
      a.turn=0;const target=chooseEnemy(b),crit=Math.random()<a.crit,value=damage(target,a.atk*(crit?1.7:1));fxAttack("ally",a.id);fxHit("enemy",target.id,value,crit?"crit":"hurt");addLog(`${actor} 普攻 ${target.name}，造成 ${value} 傷害${crit?"（暴擊）":""}。`,"damage");a.charge++;markEnemyDeath(target)
    }
    const threshold={warrior:5,paladin:6,priest:a.atk*10,mage:3,rogue:2,hunter:4,warlock:6}[a.job];
    if(a.charge>=threshold&&livingEnemies(b).length){
      a.charge=0;
      if(a.job==="priest"){fxAttack("ally",a.id);for(const t of b.allies.filter(x=>x.alive)){const heal=Math.round(a.atk*1.6);t.hp=Math.min(t.maxHp,t.hp+heal);fxPop("ally",t.id,"+"+heal,"heal")}addLog(`${actor} 觸發「${job.triggerSkill}」，治療全隊。`,"heal")}
      else{const target=chooseEnemy(b),mult={warrior:3.2,paladin:1.5,mage:4.2,rogue:3.5,hunter:4.5,warlock:3.4}[a.job]||3,crit=a.job==="rogue"||Math.random()<a.crit,value=damage(target,a.atk*mult*(crit?1.6:1));fxAttack("ally",a.id);fxHit("enemy",target.id,value,"crit");addLog(`${actor} 觸發「${job.triggerSkill}」，對 ${target.name} 造成 ${value} 傷害。`,"skill");markEnemyDeath(target)}
    }
  }
  if(!livingEnemies(b).length){winBattle();return}
  for(const e of livingEnemies(b))e.turn+=e.type==="boss"?.30:e.type==="elite"?.38:.48;
  const enemyActors=livingEnemies(b).filter(e=>e.turn>=1);
  if(enemyActors.length){const enemy=rand(enemyActors);enemy.turn=0;const targets=b.allies.filter(x=>x.alive);if(!targets.length){loseBattle();return}const target=rand(targets),value=damage(target,enemy.atk);target.charge+=(target.job==="warrior"||target.job==="paladin")?1:0;fxAttack("enemy",enemy.id);fxHit("ally",target.id,value,"hurt");addLog(`${enemy.name} 攻擊 ${label(getChar(target.id))}，造成 ${value} 傷害。`);if(target.hp<=0){target.alive=false;addLog(`${label(getChar(target.id))} 死亡。`,"death")}if(!b.allies.some(x=>x.alive)){loseBattle();return}}
  renderBattleStatus();
}
function buildScene(b){
  document.getElementById("enemyRow").innerHTML=b.enemies.map(e=>{
    const size=e.type==="boss"?68:e.type==="elite"?54:44;
    return `<div class="unit enemy" id="unit_enemy_${e.id}"><div class="ubox">${spriteImg("enemy",state.currentMap,size)}</div><div class="uhp"><div class="uhpfill" style="width:100%"></div></div><div class="uname ${e.type==="boss"?"purple":e.type==="elite"?"gold":""}">${e.name}</div></div>`;
  }).join("");
  document.getElementById("allyRow").innerHTML=b.allies.map(a=>{
    const c=getChar(a.id);
    return `<div class="unit" id="unit_ally_${a.id}"><div class="ubox">${spriteImg("char",a.id,48)}</div><div class="uhp"><div class="uhpfill" style="width:100%"></div></div><div class="uname">${label(c)}</div></div>`;
  }).join("");
}
function updateUnit(side,u){
  const el=document.getElementById(`unit_${side}_${u.id}`);if(!el)return;
  el.classList.toggle("dead",!u.alive||u.hp<=0);
  el.querySelector(".uhpfill").style.width=(u.alive?Math.max(0,100*u.hp/u.maxHp):0)+"%";
}
function fxAttack(side,id){
  const el=document.getElementById(`unit_${side}_${id}`);if(!el)return;
  el.classList.remove("atk");void el.offsetWidth;el.classList.add("atk");
  setTimeout(()=>el.classList.remove("atk"),330);
}
function fxPop(side,id,text,cls){
  const el=document.getElementById(`unit_${side}_${id}`);if(!el)return;
  const d=document.createElement("div");d.className="dmg "+cls;d.textContent=text;el.appendChild(d);
  setTimeout(()=>d.remove(),720);
}
function fxHit(side,id,value,cls){
  const el=document.getElementById(`unit_${side}_${id}`);if(!el)return;
  el.classList.remove("hit");void el.offsetWidth;el.classList.add("hit");
  setTimeout(()=>el.classList.remove("hit"),310);
  fxPop(side,id,"-"+value,cls||"hurt");
}
function renderBattleStatus(){
  const scene=document.getElementById("battleScene"),b=state.battle;
  if(!b){scene.dataset.token="";document.getElementById("enemyRow").innerHTML=`<div class="small" style="align-self:center">準備下一場戰鬥…</div>`;document.getElementById("allyRow").innerHTML="";return}
  if(scene.dataset.token!==b.token){buildScene(b);scene.dataset.token=b.token}
  for(const e of b.enemies)updateUnit("enemy",e);
  for(const a of b.allies)updateUnit("ally",a);
}
function equip(itemId,cid){
  const item=state.inventory.find(x=>x.id===itemId);if(!item||!cid)return;
  for(const eq of Object.values(state.equipped))for(const [slot,id] of Object.entries(eq||{}))if(id===itemId)delete eq[slot];
  state.equipped[cid]||={};state.equipped[cid][item.slot]=itemId;state.battle=null;saveState();renderAll();
}
function updateItemCompare(itemId,cid){
  const item=state.inventory.find(x=>x.id===itemId),c=getChar(cid),box=document.getElementById(`cmp_${itemId}`);if(!item||!c||!box)return;
  const before=effectiveStats(c),after=effectiveStats(c,item),metrics=[["生命",before.maxHp,after.maxHp,0],["攻擊",before.atk,after.atk,0],["防禦",before.def,after.def,0],["攻速",before.speed,after.speed,2],["暴率",before.crit*100,after.crit*100,1]];
  const parts=metrics.map(([name,a,b,d])=>{const diff=+(b-a).toFixed(d);if(!diff)return `<span class="small">${name} ±0</span>`;return `<span class="${diff>0?"good":"bad"}">${diff>0?"增加":"減少"} ${Math.abs(diff).toFixed(d)} ${name}</span>`});
  box.innerHTML=parts.join("｜");
}
function toggleParty(id){const index=state.party.indexOf(id);if(index>=0)state.party.splice(index,1);else if(state.party.length<partySlots())state.party.push(id);state.battle=null;saveState();renderAll()}
function summonOnce(){
  const c=rand(allCharacters);
  if(state.owned.includes(c.id)){state.essence++;return {c,dup:true}}
  state.owned.push(c.id);state.progress[c.id]={level:1,exp:0};return {c,dup:false};
}
function summonResultHTML(r){
  return `<div class="cardrow card">${spriteImg("char",r.c.id,40)}<div class="grow">${r.dup?`<span class="small">重複：${label(r.c)} → 英雄精華 +1</span>`:`<span class="good">獲得：${label(r.c)}！</span>`}</div></div>`;
}
function summon(){
  if(state.gold<100){summonResult.textContent="金幣不足。";return}state.gold-=100;
  summonResult.innerHTML=summonResultHTML(summonOnce());
  saveState();renderAll();
}
function summon10(){
  if(state.gold<900){summonResult.textContent="金幣不足（10 連需 900）。";return}state.gold-=900;
  const results=[];for(let i=0;i<10;i++)results.push(summonOnce());
  summonResult.innerHTML=results.map(summonResultHTML).join("");
  saveState();renderAll();
}
function essenceExchange(){
  const pool=allCharacters.filter(c=>!state.owned.includes(c.id));
  if(state.essence<20){summonResult.textContent="精華不足（需 20）。";return}
  if(!pool.length){summonResult.textContent="所有角色都已擁有！";return}
  state.essence-=20;const c=rand(pool);
  state.owned.push(c.id);state.progress[c.id]={level:1,exp:0};
  summonResult.innerHTML=`<div class="cardrow card">${spriteImg("char",c.id,40)}<div class="grow"><span class="gold">精華交換獲得：${label(c)}！</span></div></div>`;
  saveState();renderAll();
}
function selectMap(id){state.currentMap=id;state.stage=1;state.battle=null;saveState();renderAll();addLog(`手動前往 ${MAP[id].name}。`,"system")}
function renderAll(){
  const map=MAP[state.currentMap];mapName.textContent=map.name;tier.textContent=state.tiers[state.currentMap];stage.textContent=state.stage;gold.textContent=state.gold;essence.textContent=state.essence;worldClear.textContent=state.worldClear;
  statusLine.textContent=state.running?`自動戰鬥中（${state.speed}x）`:"已暫停";toggleBtn.textContent=state.running?"暫停":"繼續";speedBtn.textContent=`${state.speed}x`;
  essenceCount.textContent=state.essence;
  essenceBtn.disabled=state.essence<20||allCharacters.every(c=>state.owned.includes(c.id));
  summonBtn.disabled=state.gold<100;summon10Btn.disabled=state.gold<900;
  partySummary.textContent=state.party.map(id=>{const c=getChar(id);return `${label(c)} Lv.${progressOf(id).level}`}).join("、")||"無";
  enemySummary.textContent=state.battle?state.battle.enemies.map(e=>e.name).join("、"):(state.stage===10?`${map.boss}＋${map.elite}＋3隻${map.normal}`:state.stage===5?`${map.elite}＋3隻${map.normal}`:`3隻${map.normal}`)+`｜特性：${map.trait}`;
  document.getElementById("partySlots").textContent=`${state.party.length}/${partySlots()}`;
  partyList.innerHTML=state.party.map((id,n)=>{const c=getChar(id),p=progressOf(id),s=effectiveStats(c),items=equippedItems(id);return `<div class="card"><div class="cardrow"><div>${spriteImg("char",id,44)}</div><div class="grow"><div class="row"><div><span class="name">${n+1}. ${label(c)} Lv.${p.level}</span><div class="small">EXP ${p.exp}/${expNeeded(p.level)}</div></div><button class="btn danger" onclick="toggleParty('${id}')">下陣</button></div></div></div><div class="small">HP ${s.maxHp}｜攻擊 ${s.atk}｜防禦 ${s.def}｜攻速 ${s.speed}｜暴率 ${(s.crit*100).toFixed(1)}%</div><div class="small">${items.length?items.sort((a,b)=>SLOT_ORDER[a.slot]-SLOT_ORDER[b.slot]).map(i=>`${SLOTS[i.slot]}:${i.name}`).join("｜"):"尚未裝備"}</div></div>`}).join("");
  const rs=resonance();resonanceBox.innerHTML=`種族共鳴：${rs.length?rs.map(x=>`<span class="badge">${RACE[x.race].name}${x.tier}｜${x.text}</span>`).join(""):"無"}`;
  heroSlotBox.innerHTML=heroSlotUnlocked()?`<span class="accent">英雄槽：空</span><br>已解鎖；英雄卡池尚未置入。`:`英雄槽：未解鎖（完成第 3 周目開啟）`;
  rosterList.innerHTML=state.owned.map(getChar).filter(Boolean).map(c=>{const on=state.party.includes(c.id),p=progressOf(c.id);return `<div class="card row"><div class="cardrow">${spriteImg("char",c.id,36)}<div><span class="name">${label(c)} Lv.${p.level}</span><div class="small">EXP ${p.exp}/${expNeeded(p.level)}</div></div></div><button class="btn ${on?"danger":"primary"}" onclick="toggleParty('${c.id}')" ${!on&&state.party.length>=partySlots()?"disabled":""}>${on?"下陣":"上陣"}</button></div>`}).join("");
  const sorted=[...state.inventory].sort((a,b)=>SLOT_ORDER[a.slot]-SLOT_ORDER[b.slot]||a.set.localeCompare(b.set)||a.name.localeCompare(b.name));
  bagCount.textContent=sorted.length;
  bagList.innerHTML=sorted.length?sorted.map(item=>{
    const wearer=findWearer(item.id),selected=wearer||state.owned[0]||"";
    const options=state.owned.map(id=>`<option value="${id}" ${id===selected?"selected":""}>${label(getChar(id))} Lv.${progressOf(id).level}</option>`).join("");
    return `<div class="card"><div class="row"><div><div class="accent">${item.name}</div><div class="small">${item.set}套｜${SLOTS[item.slot]}</div></div><div class="small">穿戴：${wearer?label(getChar(wearer)):"無"}</div></div><div>攻擊+${item.atk}　生命+${item.hp}　防禦+${item.def}　攻速+${Number(item.speed).toFixed(2)}　暴率+${(Number(item.crit)*100).toFixed(1)}%</div><div class="grid2" style="margin-top:7px"><select id="sel_${item.id}" onchange="updateItemCompare('${item.id}',this.value)">${options}</select><button class="btn" onclick="equip('${item.id}',document.getElementById('sel_${item.id}').value)">裝備</button></div><div id="cmp_${item.id}" class="small" style="margin-top:7px"></div></div>`;
  }).join(""):`<div class="small">尚無裝備，先去戰鬥。</div>`;
  mapList.innerHTML=DATA.maps.map((m,index)=>`<div class="card"><div class="row"><div class="cardrow">${spriteImg("enemy",m.id,40)}<div><span class="name">${index+1}. ${m.name}</span><div class="small">怪物：${m.normal}／${m.elite}／${m.boss}</div><div class="small">特性：${m.trait}｜掉落：${m.set}套｜Tier ${state.tiers[m.id]}</div></div></div><button class="btn ${state.currentMap===m.id?"primary":""}" onclick="selectMap('${m.id}')" ${index>=state.unlockedMaps?"disabled":""}>${index>=state.unlockedMaps?"未解鎖":state.currentMap===m.id?"目前":"前往"}</button></div></div>`).join("");
  renderBattleStatus();requestAnimationFrame(()=>{for(const item of sorted){const wearer=findWearer(item.id),cid=wearer||state.owned[0];if(cid)updateItemCompare(item.id,cid)}});
}
document.querySelectorAll("nav button").forEach(button=>button.onclick=()=>{document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));button.classList.add("active");document.getElementById(button.dataset.page).classList.add("active")});
toggleBtn.onclick=()=>{state.running=!state.running;saveState();renderAll()};
speedBtn.onclick=()=>{state.speed=state.speed===1?2:state.speed===2?5:1;saveState();restartTimer();renderAll()};
summonBtn.onclick=summon;
summon10Btn.onclick=summon10;
essenceBtn.onclick=essenceExchange;
exportBtn.onclick=()=>saveText.value=JSON.stringify({...state,battle:null},null,2);
importBtn.onclick=()=>{try{localStorage.setItem(SAVE_KEY,saveText.value);state=loadState();renderAll();alert("匯入成功")}catch{alert("存檔格式錯誤")}};
resetBtn.onclick=()=>{if(confirm("確定重置全部進度？")){localStorage.removeItem(SAVE_KEY);state=clone(defaultState);battleLog.innerHTML="";addLog("存檔已重置。","system");restartTimer();renderAll()}};
dataPreview.textContent=JSON.stringify(DATA,null,2);
function restartTimer(){clearInterval(timer);timer=setInterval(stepBattle,Math.max(110,680/state.speed))}
renderAll();addLog("像素原型 v0.07 啟動：新增像素角色戰鬥場景、傷害飄字、10 連召募、精華交換；掉寶率上調（普通10%／菁英35%／Boss必掉）；修正觸發技能永不發動的問題。","system");restartTimer();
</script>
</body>
</html>
